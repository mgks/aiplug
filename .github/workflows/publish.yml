name: publish

# Auto-publish to npm when a GitHub release is published.
# Also runs on manual dispatch (e.g. for back-filling or testing).
#
# Prerequisite: add `NPM_TOKEN` as a repository secret in
#   Settings -> Secrets and variables -> Actions
# The token must have publish access to the `aiplug` package.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run build + tests but skip the actual publish'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate provider registry
        run: npm run build:registry

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: find src/__tests__ -name "*.test.ts" -print0 | xargs -0 npx tsx --test

      - name: Smoke
        if: success()
        run: npm run smoke

      - name: Smoke (end-to-end HTTP)
        if: success()
        run: npm run smoke:e2e

      - name: Verify package contents
        if: success()
        run: npm pack --dry-run

  publish:
    name: publish to npm
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public